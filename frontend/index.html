<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kaleidoscope</title>
    <script defer src="/src/main.ts" type="module"></script>
    <link rel="stylesheet" href="/src/styles/main.scss" />
    <link rel="stylesheet" href="/katex/katex.min.css" />
  </head>
  <body>
    <main>
      <template id="math-input-template">
        <div class="math-input-container">
          <div class="math-field-controls">
            <div class="math-field-close math-field-control">
              <object class="math-field-control-close" data="/svgs/cross.svg" type="image/svg+xml"></object>
            </div>
          </div>
        </div>
      </template>

      <div id="math-inputs-list">
        <div id="add-new-math-input">+</div>
      </div>

      <div id="controls">
        <div id="reduce-button" class="control-button">
          <object class="reduce-button-svg" data="/svgs/play.svg" type="image/svg+xml"></object>
        </div>
      </div>

      <div id="renderer-select">
        <div id="svg-tree-renderer-select">SVG Tree</div>
        <div id="manim-renderer-select">Manim</div>
      </div>

      <div id="render-area"></div>
    </main>
  </body>
</html>
